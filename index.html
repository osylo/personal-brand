<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juanita - Camino a la Ciudadanía</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #1a2a6c;
            --banana: #FFD700;
            --banana-soft: #FFFEF0;
            --success: #27ae60;
            --error: #e74c3c;
            --bg: #fdfdfd;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 15px;
            margin: 0;
            color: #333;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            text-align: center;
            border: 4px solid var(--banana);
        }
        h1 { color: var(--primary); margin-bottom: 5px; }
        .welcome-text { color: #666; margin-bottom: 20px; font-weight: bold; }
        
        /* Tarjeta de Estudio */
        .card {
            min-height: 250px;
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid #eee;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        .q-en { font-size: 1.4rem; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
        .q-es { font-size: 1rem; color: #777; font-style: italic; margin-bottom: 15px; }
        
        /* Dictado y Resultado */
        .dictation-box {
            background: #f9f9f9;
            border: 2px dashed var(--banana);
            padding: 10px;
            border-radius: 10px;
            min-height: 40px;
            margin: 10px 0;
            font-weight: bold;
            color: var(--primary);
        }
        .feedback { font-weight: 800; margin: 10px 0; display: none; padding: 10px; border-radius: 8px; }
        .ans-box {
            background: var(--banana-soft);
            color: var(--primary);
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            display: none;
            border: 2px solid var(--banana);
        }

        /* Botones */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button {
            padding: 14px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-audio { background: var(--primary); color: white; grid-column: span 2; }
        .btn-mic { background: #ff4757; color: white; grid-column: span 2; font-size: 1.1rem; }
        .btn-mic.listening { animation: pulse 1.5s infinite; background: #ff1f33; }
        .btn-check { background: var(--banana); color: var(--primary); grid-column: span 2; }
        .btn-nav { background: #eee; color: var(--primary); }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 71, 87, 0.5); }
            100% { transform: scale(1); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h1>¡Hola, Juanita! 🍌</h1>
        <p class="welcome-text">Tu camino a la ciudadanía comienza hoy.</p>
        <button class="btn-check" onclick="startApp()">COMENZAR A ESTUDIAR</button>
    </div>

    <div id="app-screen" class="hidden">
        <small id="counter" style="color: #999;">Pregunta 1 de 10</small>
        
        <div class="card">
            <div id="q-en" class="q-en">Cargando...</div>
            <div id="q-es" class="q-es">Cargando...</div>
            
            <div id="dictation-result" class="dictation-box">Presiona el micrófono y di la respuesta...</div>
            <div id="feedback-msg" class="feedback"></div>
            <div id="answer-box" class="ans-box"></div>
        </div>

        <div class="controls">
            <button class="btn-audio" onclick="playCurrent(true)">🔊 ESCUCHAR PREGUNTA</button>
            <button class="btn-mic" id="mic-btn" onclick="startDictation()">🎤 DICTAR RESPUESTA</button>
            <button class="btn-check" id="action-btn" onclick="toggleAnswer()">VER RESPUESTA CORRECTA</button>
            <button class="btn-nav" onclick="changeQ(-1)">ATRÁS</button>
            <button class="btn-nav" onclick="changeQ(1)">SIGUIENTE</button>
        </div>
    </div>

    <div id="finish-screen" class="hidden">
        <h2>¡Lo lograste, Juanita!</h2>
        <p>Eres una campeona. Has repasado tus preguntas de hoy.</p>
        <button class="btn-check" onclick="location.reload()">REPETIR SESIÓN</button>
    </div>
</div>

<script>
    const questions = [
        { en: "What is the supreme law of the land?", es: "¿Cuál es la ley suprema de la nación?", ans: "The Constitution" },
        { en: "What does the Constitution do?", es: "¿Qué hace la Constitución?", ans: "Sets up the government" },
        { en: "What is an amendment?", es: "¿Qué es una enmienda?", ans: "A change" },
        { en: "What do we call the first ten amendments to the Constitution?", es: "¿Cómo se llaman las primeras diez enmiendas?", ans: "The Bill of Rights" },
        { en: "What is one right or freedom from the First Amendment?", es: "Un derecho de la primera enmienda:", ans: "Speech" },
        { en: "How many amendments does the Constitution have?", es: "¿Cuántas enmiendas tiene la Constitución?", ans: "27" },
        { en: "Who is in charge of the executive branch?", es: "¿Quién manda en la rama ejecutiva?", ans: "The President" },
        { en: "Who makes federal laws?", es: "¿Quién hace las leyes federales?", ans: "Congress" },
        { en: "What are the two parts of the U.S. Congress?", es: "¿Partes del Congreso?", ans: "The Senate and House" },
        { en: "What is the economic system in the United States?", es: "¿Sistema económico de USA?", ans: "Market economy" }
    ];

    let currentIdx = 0;
    const recognition = window.SpeechRecognition || window.webkitSpeechRecognition ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;
    if(recognition) {
        recognition.lang = 'en-US';
        recognition.interimResults = false;
    }

    function startApp() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        update();
    }

    function update() {
        const q = questions[currentIdx];
        document.getElementById('q-en').innerText = q.en;
        document.getElementById('q-es').innerText = q.es;
        document.getElementById('answer-box').innerText = "Respuesta oficial: " + q.ans;
        document.getElementById('answer-box').style.display = 'none';
        document.getElementById('dictation-result').innerText = "Presiona el micrófono y habla...";
        document.getElementById('feedback-msg').style.display = 'none';
        document.getElementById('counter').innerText = `Pregunta ${currentIdx + 1} de ${questions.length}`;
        window.speechSynthesis.cancel();
    }

    function playCurrent(isQuestion) {
        const text = isQuestion ? questions[currentIdx].en : questions[currentIdx].ans;
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 0.85; // VELOCIDAD AL 85%
        window.speechSynthesis.speak(msg);
    }

    function startDictation() {
        if(!recognition) return alert("Tu navegador no soporta dictado por voz.");
        
        const btn = document.getElementById('mic-btn');
        btn.classList.add('listening');
        btn.innerText = "ESCUCHANDO...";
        recognition.start();

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById('dictation-result').innerText = "Dijiste: " + transcript;
            checkAnswer(transcript);
        };

        recognition.onend = () => {
            btn.classList.remove('listening');
            btn.innerText = "🎤 DICTAR RESPUESTA";
        };
    }

    function checkAnswer(text) {
        const official = questions[currentIdx].ans.toLowerCase();
        const userText = text.toLowerCase();
        const feedback = document.getElementById('feedback-msg');
        feedback.style.display = 'block';

        // Verificación simple (si la respuesta oficial está contenida en lo que dijo)
        if (userText.includes(official.split(' ')[0])) {
            feedback.innerText = "¡EXCELENTE JUANITA! ✅";
            feedback.style.color = "var(--success)";
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#FFD700', '#1a2a6c'] });
        } else {
            feedback.innerText = "¡Casi! Intenta de nuevo o mira la respuesta ✍️";
            feedback.style.color = "var(--error)";
        }
    }

    function toggleAnswer() {
        const box = document.getElementById('answer-box');
        if(box.style.display === 'none') {
            box.style.display = 'block';
            playCurrent(false); // Audio de la respuesta a velocidad lenta
        } else {
            box.style.display = 'none';
        }
    }

    function changeQ(dir) {
        currentIdx += dir;
        if(currentIdx < 0) currentIdx = 0;
        if(currentIdx >= questions.length) {
            document.getElementById('app-screen').classList.add('hidden');
            document.getElementById('finish-screen').classList.remove('hidden');
        } else {
            update();
        }
    }
</script>

</body>
</html>
