<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciudadanía USA - ALL STEAMER Edition</title>
    <style>
        :root {
            --primary: #1a2a6c; /* Azul oscuro para texto y botones secundarios */
            --accent: #FFD700;   /* Amarillo Banana intenso */
            --accent-hover: #FFC800; /* Amarillo Banana un poco más oscuro */
            --success: #27ae60;
            --bg: #fdfdfd;      /* Fondo casi blanco */
            --text-main: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            color: var(--text-main);
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            border-top: 5px solid var(--accent); /* Detalle superior amarillo */
        }
        h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        p { color: #666; margin-bottom: 25px; }

        /* Barra de progreso en Amarillo Banana */
        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            background: var(--accent); /* Llenado amarillo */
            width: 0%;
            transition: 0.3s;
        }

        .card {
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 2px solid #f1f1f1;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            background: #fff;
        }
        .q-en { font-size: 1.5rem; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
        .q-es { font-size: 1.1rem; color: #555; font-style: italic; border-top: 1px solid #eee; padding-top: 15px; }
        
        /* Caja de respuesta resaltada con fondo amarillo muy suave */
        .ans-box {
            background: #FFFEF0; /* Fondo amarillo crema muy pálido */
            color: var(--primary);
            padding: 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            display: none;
            margin-top: 20px;
            border: 1px solid var(--accent);
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        button {
            padding: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.2s;
            text-transform: uppercase;
        }
        
        /* Botones principales en Amarillo Banana */
        .btn-check, .btn-main {
            background-color: var(--accent);
            color: var(--primary); /* Texto oscuro para contraste */
            grid-column: span 2;
        }
        .btn-check:hover, .btn-main:hover { background-color: var(--accent-hover); }

        /* Botón de Audio en azul oscuro */
        .btn-audio {
            background-color: var(--primary);
            color: white;
            grid-column: span 2;
            margin-bottom: 5px;
        }

        /* Botones de navegación en azul oscuro */
        .btn-nav {
            background-color: #f1f1f1;
            color: var(--primary);
        }
        .btn-nav:hover { background-color: #e5e5e5; }

        /* Estilos para las pantallas ocultas */
        .hidden { display: none !important; }
        #setup-screen button { width: 100%; margin-bottom: 15px; }

    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="setup-screen">
        <h1>Bienvenida a tu Estudio</h1>
        <p>¿Qué te gustaría hacer hoy para practicar?</p>
        <button class="btn-main" onclick="startStudy()">REPASAR LAS 100 PREGUNTAS</button>
        <button class="btn-audio" onclick="startQuiz()">TOMAR EXAMEN (10 AL AZAR)</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <small id="status-text" style="color: #666;">Pregunta 1 de 10</small>
        
        <div class="card">
            <div id="q-en" class="q-en"></div>
            <div id="q-es" class="q-es"></div>
            <div id="answer" class="ans-box"></div>
        </div>

        <div class="controls">
            <button class="btn-audio" onclick="playAudio()">🔊 ESCUCHAR EN INGLÉS</button>
            <button class="btn-check" id="action-btn" onclick="handleAction()">MOSTRAR RESPUESTA</button>
            <button class="btn-nav" id="prev-btn" onclick="changeQ(-1)">ANTERIOR</button>
            <button class="btn-nav" id="next-btn" onclick="changeQ(1)">SIGUIENTE</button>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2>¡Excelente repaso!</h2>
        <div class="card" style="border: 2px solid var(--accent); background: #FFFEF0;">
            <p style="font-size: 1.2rem; color: var(--primary); font-weight: 600;">
                Has completado la sesión de hoy. Sigue así y pronto estarás lista para tu entrevista.
            </p>
        </div>
        <button class="btn-check" onclick="location.reload()">VOLVER AL INICIO</button>
    </div>
</div>

<script>
    const allQuestions = [
        { en: "What is the supreme law of the land?", es: "¿Cuál es la ley suprema de la nación?", ans: "The Constitution" },
        { en: "What does the Constitution do?", es: "¿Qué hace la Constitución?", ans: "Sets up the government / Protege los derechos básicos" },
        { en: "The idea of self-government is in the first three words of the Constitution. What are these words?", es: "¿Cuáles son las primeras tres palabras de la Constitución?", ans: "We the People" },
        { en: "What is an amendment?", es: "¿Qué es una enmienda?", ans: "A change / An addition (to the Constitution)" },
        { en: "What do we call the first ten amendments to the Constitution?", es: "Las primeras diez enmiendas se llaman...", ans: "The Bill of Rights" },
        { en: "What is one right or freedom from the First Amendment?", es: "Un derecho de la Primera Enmienda:", ans: "Speech / Religion / Press" },
        { en: "How many amendments does the Constitution have?", es: "¿Cuántas enmiendas tiene la Constitución?", ans: "27" },
        { en: "Who is in charge of the executive branch?", es: "¿Quién manda en la rama ejecutiva?", ans: "The President" },
        { en: "Who makes federal laws?", es: "¿Quién hace las leyes federales?", ans: "Congress" },
        { en: "What are the two parts of the U.S. Congress?", es: "¿Partes del Congreso?", ans: "The Senate and House" }
        // Se pueden añadir más siguiendo este patrón
    ];

    let currentQuestions = [];
    let idx = 0;
    let isQuizMode = false;

    function startStudy() {
        isQuizMode = false;
        currentQuestions = [...allQuestions];
        showScreen('quiz-screen');
        update();
    }

    function startQuiz() {
        isQuizMode = true;
        currentQuestions = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, 10);
        showScreen('quiz-screen');
        update();
    }

    function showScreen(id) {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    function update() {
        const q = currentQuestions[idx];
        document.getElementById('q-en').innerText = q.en;
        document.getElementById('q-es').innerText = q.es;
        document.getElementById('answer').innerText = "RESPUESTA: " + q.ans;
        document.getElementById('answer').style.display = 'none';
        
        const actionBtn = document.getElementById('action-btn');
        actionBtn.innerText = "MOSTRAR RESPUESTA";
        actionBtn.style.backgroundColor = "var(--accent)"; // Reset color

        document.getElementById('status-text').innerText = isQuizMode ? `Pregunta ${idx + 1} de 10 (Examen)` : `Pregunta ${idx + 1} de ${currentQuestions.length} (Estudio)`;
        document.getElementById('progress-fill').style.width = ((idx + 1) / currentQuestions.length * 100) + "%";
        
        // Manejo de botones navegación
        document.getElementById('prev-btn').style.visibility = idx === 0 ? 'hidden' : 'visible';
    }

    function handleAction() {
        const ans = document.getElementById('answer');
        const actionBtn = document.getElementById('action-btn');
        
        if (ans.style.display === 'none') {
            ans.style.display = 'block';
            if (isQuizMode && idx === currentQuestions.length - 1) {
                actionBtn.innerText = "TERMINAR Y VER RESULTADO";
                actionBtn.style.backgroundColor = "var(--success)"; // Cambiar a verde al final
                actionBtn.style.color = "white";
            } else {
                actionBtn.innerText = "SIGUIENTE PREGUNTA";
            }
        } else {
            if (isQuizMode && idx === currentQuestions.length - 1) {
                showResults();
            } else {
                changeQ(1);
            }
        }
    }

    function changeQ(dir) {
        idx += dir;
        if (idx < 0) idx = 0;
        if (idx >= currentQuestions.length) {
            idx = currentQuestions.length - 1;
            if(!isQuizMode) showResults(); // En estudio, también mostramos resultado final
        }
        update();
    }

    function playAudio() {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(currentQuestions[idx].en);
        msg.lang = 'en-US';
        msg.rate = 0.85; 
        window.speechSynthesis.speak(msg);
    }

    function showResults() {
        showScreen('result-screen');
    }
</script>
</body>
</html>
